<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click and Drag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="items">
    <div class="item item1">01</div>
    <div class="item item2">02</div>
    <div class="item item3">03</div>
    <div class="item item4">04</div>
    <div class="item item5">05</div>
    <div class="item item6">06</div>
    <div class="item item7">07</div>
    <div class="item item8">08</div>
    <div class="item item9">09</div>
    <div class="item item10">10</div>
    <div class="item item11">11</div>
    <div class="item item12">12</div>
    <div class="item item13">13</div>
    <div class="item item14">14</div>
    <div class="item item15">15</div>
    <div class="item item16">16</div>
    <div class="item item17">17</div>
    <div class="item item18">18</div>
    <div class="item item19">19</div>
    <div class="item item20">20</div>
    <div class="item item21">21</div>
    <div class="item item22">22</div>
    <div class="item item23">23</div>
    <div class="item item24">24</div>
    <div class="item item25">25</div>
  </div>

<script>
//Your code goes here
	function initApp() {
            const todos = ['Buy groceries', 'Walk dog', 'Code app', 'Read book'];
            const container = document.getElementById('todoContainer');
            
            // Null checks
            if (!container) {
                console.error('Container not found');
                return;
            }

            function renderTodos() {
                container.innerHTML = '';
                todos.forEach((text, i) => {
                    const item = document.createElement('div');
                    item.className = 'todo-item';
                    item.textContent = text;
                    item.style.left = `${20 + (i % 2) * 280}px`;
                    item.style.top = `${20 + Math.floor(i / 2) * 80}px`;
                    makeDraggable(item);
                    container.appendChild(item);
                });
            }

            function addTodo() {
                const input = document.getElementById('newTodo');
                const btn = document.getElementById('addBtn');
                if (!input || !btn) return; // SAFE: No crash
                
                if (input.value.trim()) {
                    todos.push(input.value.trim());
                    input.value = '';
                    renderTodos();
                }
            }

            function makeDraggable(item) {
    item.style.position = 'absolute'; // Ensure
    
    item.addEventListener('mousedown', handleMouseDown);
    
    function handleMouseDown(e) {
        e.preventDefault();
        
        // Create NATIVE MouseEvent (Cypress fires this)
        const mouseDownEvent = new MouseEvent('mousedown', {
            bubbles: true, cancelable: true, clientX: e.clientX, clientY: e.clientY
        });
        item.dispatchEvent(mouseDownEvent);
        
        const rect = item.getBoundingClientRect();
        const contRect = container.getBoundingClientRect();
        const shiftX = e.clientX - rect.left;
        const shiftY = e.clientY - rect.top;
        
        item.style.zIndex = 1000;
        item.style.transition = 'none';
        
        function handleMouseMove(e2) {
            const newLeft = e2.clientX - shiftX - contRect.left;
            const newTop = e2.clientY - shiftY - contRect.top;
            const maxLeft = container.offsetWidth - item.offsetWidth;
            const maxTop = container.offsetHeight - item.offsetHeight;
            
            item.style.left = Math.max(0, Math.min(newLeft, maxLeft)) + 'px';
            item.style.top = Math.max(0, Math.min(newTop, maxTop)) + 'px';
        }
        
        function handleMouseUp() {
            item.style.zIndex = '';
            item.style.transition = 'all 0.2s';
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);
        }
        
        // Use addEventListener (fires for Cypress)
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
    }
}

            // Event listeners SAFE
            const input = document.getElementById('newTodo');
            const btn = document.getElementById('addBtn');
            if (input && btn) {
                btn.onclick = addTodo;
                input.onkeypress = (e) => { if (e.key === 'Enter') addTodo(); };
            }

            renderTodos();
        }

        // INIT: Multiple safe checks (Cypress-proof)
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
</script>

  </body>
</html>
