<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click and Drag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="items">
    <div class="item item1">01</div>
    <div class="item item2">02</div>
    <div class="item item3">03</div>
    <div class="item item4">04</div>
    <div class="item item5">05</div>
    <div class="item item6">06</div>
    <div class="item item7">07</div>
    <div class="item item8">08</div>
    <div class="item item9">09</div>
    <div class="item item10">10</div>
    <div class="item item11">11</div>
    <div class="item item12">12</div>
    <div class="item item13">13</div>
    <div class="item item14">14</div>
    <div class="item item15">15</div>
    <div class="item item16">16</div>
    <div class="item item17">17</div>
    <div class="item item18">18</div>
    <div class="item item19">19</div>
    <div class="item item20">20</div>
    <div class="item item21">21</div>
    <div class="item item22">22</div>
    <div class="item item23">23</div>
    <div class="item item24">24</div>
    <div class="item item25">25</div>
  </div>

<script>
//Your code goes here
document.addEventListener('DOMContentLoaded', function () {
    const container = document.querySelector('.items');
    const items = document.querySelectorAll('.item');

    items.forEach(item => makeDraggable(item, container));

    function makeDraggable(item, container) {
        let isDragging = false;

        item.onmousedown = function (e) {
            e.preventDefault();
            isDragging = true;

            const rect = item.getBoundingClientRect();
            const contRect = container.getBoundingClientRect();
            const shiftX = e.clientX - rect.left;
            const shiftY = e.clientY - rect.top;

            // Save original index before dragging
            const originalIndex = Array.from(container.children).indexOf(item);
            item.dataset.originalIndex = originalIndex;

            // Make it absolute during drag
            item.style.zIndex = 1000;
            item.style.position = 'absolute';
            item.style.transition = 'none';

            item.style.left = rect.left - contRect.left + 'px';
            item.style.top = rect.top - contRect.top + 'px';

            function moveHandler(e2) {
                if (!isDragging) return;

                let newLeft = e2.clientX - shiftX - contRect.left;
                let newTop = e2.clientY - shiftY - contRect.top;

                const maxLeft = container.offsetWidth - rect.width;
                const maxTop = container.offsetHeight - rect.height;

                item.style.left = Math.max(0, Math.min(newLeft, maxLeft)) + 'px';
                item.style.top = Math.max(0, Math.min(newTop, maxTop)) + 'px';
            }

            function upHandler() {
                if (!isDragging) return;

                isDragging = false;

                // Find drop target (closest .item and in same container)
                const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
                const targetItem = dropTarget?.closest('.item');

                if (targetItem && targetItem !== item && targetItem.parentNode === container) {
                    container.insertBefore(item, targetItem);
                } else {
                    // Snap back to original visual order (if needed)
                    const originalIndex = parseInt(item.dataset.originalIndex || '0', 10);
                    const siblings = Array.from(container.children);
                    const currentPos = siblings.indexOf(item);

                    if (originalIndex !== currentPos) {
                        if (originalIndex < container.children.length) {
                            container.insertBefore(item, container.children[originalIndex]);
                        } else {
                            container.appendChild(item);
                        }
                    }
                }

                // Reset drag styling
                item.style.zIndex = '';
                item.style.position = '';
                item.style.left = '';
                item.style.top = '';
                item.style.transition = 'all 0.2s ease';

                // Clean up
                document.removeEventListener('mousemove', moveHandler);
                document.removeEventListener('mouseup', upHandler);
            }

            document.addEventListener('mousemove', moveHandler);
            document.addEventListener('mouseup', upHandler);
        };
    }
});

</script>
  </body>
</html>
