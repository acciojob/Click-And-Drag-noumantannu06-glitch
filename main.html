<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click and Drag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="items">
    <div class="item item1">01</div>
    <div class="item item2">02</div>
    <div class="item item3">03</div>
    <div class="item item4">04</div>
    <div class="item item5">05</div>
    <div class="item item6">06</div>
    <div class="item item7">07</div>
    <div class="item item8">08</div>
    <div class="item item9">09</div>
    <div class="item item10">10</div>
    <div class="item item11">11</div>
    <div class="item item12">12</div>
    <div class="item item13">13</div>
    <div class="item item14">14</div>
    <div class="item item15">15</div>
    <div class="item item16">16</div>
    <div class="item item17">17</div>
    <div class="item item18">18</div>
    <div class="item item19">19</div>
    <div class="item item20">20</div>
    <div class="item item21">21</div>
    <div class="item item22">22</div>
    <div class="item item23">23</div>
    <div class="item item24">24</div>
    <div class="item item25">25</div>
  </div>

<script>
//Your code goes here
	const todos = ['Buy groceries', 'Walk dog', 'Code app', 'Read book'];
        const container = document.getElementById('todoContainer');

        function renderTodos() {
            container.innerHTML = '';
            todos.forEach((text, i) => {
                const item = document.createElement('div');
                item.className = 'todo-item';
                item.textContent = text;
                item.style.left = `${20 + (i % 2) * 280}px`;
                item.style.top = `${20 + Math.floor(i / 2) * 80}px`;
                item.draggable = true;
                makeDraggable(item);
                container.appendChild(item);
            });
        }

        function addTodo() {
            const input = document.getElementById('newTodo');
            if (input.value.trim()) {
                todos.push(input.value.trim());
                input.value = '';
                renderTodos();
            }
        }

        function makeDraggable(item) {
            let isDragging = false, shiftX = 0, shiftY = 0;

            item.onmousedown = (e) => {
                e.preventDefault();
                isDragging = true;
                const rect = item.getBoundingClientRect();
                shiftX = e.clientX - rect.left;
                shiftY = e.clientY - rect.top;
                item.style.zIndex = 1000;
                item.style.transition = 'none';
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };

            function onMouseMove(e) {
                if (!isDragging) return;
                let newLeft = e.clientX - shiftX - container.getBoundingClientRect().left;
                let newTop = e.clientY - shiftY - container.getBoundingClientRect().top;
                const contRect = container.getBoundingClientRect();
                newLeft = Math.max(0, Math.min(newLeft, contRect.width - item.offsetWidth));
                newTop = Math.max(0, Math.min(newTop, contRect.height - item.offsetHeight));
                item.style.left = `${newLeft}px`;
                item.style.top = `${newTop}px`;
            }

            function onMouseUp() {
                isDragging = false;
                item.style.zIndex = '';
                item.style.transition = 'box-shadow 0.2s, transform 0.2s';
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);
            }
        }

        renderTodos();
</script>

  </body>
</html>
